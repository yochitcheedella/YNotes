<main class="relative z-10 pt-24 pb-32 px-container-padding-mobile md:px-0">
<div class="max-w-[1024px] mx-auto space-y-8">
<!-- Date & Header Section -->
<section class="flex flex-col md:flex-row md:items-end justify-between gap-6">
<div class="space-y-2">
<div class="flex items-center gap-3 text-primary">

<input class="bg-transparent border-none font-label-sm text-label-sm text-primary focus:ring-0 p-0 cursor-pointer" type="date" value="2023-10-27"/>
<span class="text-outline-variant">•</span>
<input class="bg-transparent border-none font-label-sm text-label-sm text-primary focus:ring-0 p-0 cursor-pointer" type="time" value="20:45"/>
</div>
<input class="w-full bg-transparent border-none font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface focus:ring-0 placeholder:text-surface-variant p-0" placeholder="Untitled Reflection" type="text" id="entry-title"/>
</div>
<!-- Mood Selector -->
<div class="glass-panel p-4 rounded-xl flex flex-col gap-3 min-w-[280px]">
<span class="font-label-sm text-label-sm text-on-surface-variant px-1">HOW ARE YOU FEELING?</span>
<div class="flex justify-between items-center gap-2" id="mood-selector">
<button class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-surface-variant/30 transition-all group" onclick="selectMood(this, 'Happy')">

<span class="font-meta-detail text-meta-detail text-on-surface-variant">Happy</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-surface-variant/30 transition-all group" onclick="selectMood(this, 'Normal')">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 0;">sentiment_neutral</span>
<span class="font-meta-detail text-meta-detail text-on-surface-variant">Normal</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-surface-variant/30 transition-all group" onclick="selectMood(this, 'Sad')">
<span class="material-symbols-outlined text-on-primary-container group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 0;">sentiment_very_dissatisfied</span>

</button>
<button class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-surface-variant/30 transition-all group" onclick="selectMood(this, 'Angry')">

<span class="font-meta-detail text-meta-detail text-on-surface-variant">Angry</span>
</button>
<button class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-surface-variant/30 transition-all group mood-chip-active" onclick="selectMood(this, 'Excited')">

<span class="material-symbols-outlined text-on-surface-variant group-hover:skew-x-2 transition-transform">description</span>

<span class="material-symbols-outlined">settings</span>

</a>

<script>
        let selectedMoodValue = 'Excited';
        function selectMood(element, mood) {
            // Remove active class from all mood chips
            const chips = document.querySelectorAll('#mood-selector button');
            chips.forEach(chip => {
                chip.classList.remove('mood-chip-active');
                const icon = chip.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            });
            
            // Add active class to selected chip
            element.classList.add('mood-chip-active');
            const activeIcon = element.querySelector('.material-symbols-outlined');
            activeIcon.style.fontVariationSettings = "'FILL' 1";
            
            selectedMoodValue = mood;
            
            // Create a small feedback effect
            const glow = document.querySelector('.glow-accent');
            const color = window.getComputedStyle(activeIcon).color;
            glow.style.background = `radial-gradient(circle at 50% 50%, ${color}15 0%, transparent 70%)`;
        }

        function saveEntry() {
            const title = document.getElementById('entry-title').value || 'Untitled Reflection';
            const content = document.getElementById('entry-content').value;
            if(!content) {
                alert("Please write something first!");
                return;
            }
            alert(`Entry Saved! \nTitle: ${title} \nMood: ${selectedMoodValue} \nStatus: Encrypted with AES-256`);
            location.href = 'dashboard.html';
        }

        // Auto-save simulation
        let timer;
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                console.log('Draft saved to vault...');
            }, 2000);
        });
    </script>
